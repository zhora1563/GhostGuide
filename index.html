<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>👻 Ghost Guide</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
  <style>
    :root{
      --bg0:#070a10;
      --bg1:#0b1220;
      --panel:#0f1628;
      --card:#0c1426;
      --text:#e8eefc;
      --muted:#a9b6d3;
      --border:rgba(255,255,255,.10);
      --border2:rgba(255,255,255,.07);
      --accent:#8fb8ff;
      --accent2:#86ffd6;
      --chipBg:rgba(143,184,255,.10);
      --chipBorder:rgba(143,184,255,.22);
      --shadow:0 16px 44px rgba(0,0,0,.48);
      --radius:18px;
      --sans: Inter, Manrope, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Noto Sans", "Helvetica Neue", sans-serif;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono","Courier New", monospace;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:var(--sans);
      color:var(--text);
      background:
        radial-gradient(1200px 700px at 20% -10%, rgba(143,184,255,.18), transparent 60%),
        radial-gradient(900px 600px at 90% 0%, rgba(134,255,214,.12), transparent 60%),
        radial-gradient(900px 700px at 55% 120%, rgba(143,184,255,.08), transparent 60%),
        linear-gradient(180deg, var(--bg0), var(--bg1));
      min-height:100vh;
    }

    header{
      position:sticky; top:0; z-index:50;
      backdrop-filter: blur(10px);
      background: linear-gradient(to bottom, rgba(7,10,16,.92), rgba(7,10,16,.66));
      border-bottom:1px solid var(--border);
    }
    .wrap{max-width:1100px;margin:0 auto;padding:16px}
    .top{display:flex;gap:12px;align-items:center;justify-content:space-between;flex-wrap:wrap}
    .brand{display:flex;gap:12px;align-items:center}
    .logo{
      width:42px;height:42px;border-radius:14px;
      background:linear-gradient(135deg,#6aa8ff,#c878ff,#8affd6);
      background-size:200% 200%;
      box-shadow:0 0 18px rgba(106,168,255,.55),
                 0 0 34px rgba(200,120,255,.28),
                 0 0 40px rgba(134,255,214,.25),
                 inset 0 0 10px rgba(255,255,255,.20);
      animation: logoGlow 4.8s ease-in-out infinite, logoShift 7.5s ease-in-out infinite;
    }
    h1{font-size:16px;margin:0; letter-spacing:.2px}
    .subtitle{font-size:12px;color:var(--muted);margin-top:2px}
    .controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .pill{
      border:1px solid var(--border);
      background:rgba(15,22,40,.62);
      color:var(--text);
      border-radius:999px;
      padding:8px 12px;
      font-size:13px;
      cursor:pointer;
      transition:transform .08s ease, border-color .2s ease, background .2s ease;
    }
    .pill:hover{transform: translateY(-1px)}
    .pill[aria-pressed="true"]{
      border-color:rgba(143,184,255,.55);
      box-shadow:0 0 0 4px rgba(143,184,255,.10);
    }
    input{
      border:1px solid var(--border);
      background:rgba(15,22,40,.62);
      color:var(--text);
      border-radius:14px;
      padding:10px 12px;
      outline:none;
      min-width:260px;
    }
    input:focus{
      border-color:rgba(143,184,255,.55);
      box-shadow:0 0 0 4px rgba(143,184,255,.10);
    }
    main .wrap{padding-top:12px}

    .panel{
      background:rgba(15,22,40,.50);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      overflow:hidden;
    }
    .panel .head{
      padding:14px 16px;
      border-bottom:1px solid var(--border2);
      display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap
    }
    .panel .title{font-weight:900;font-size:14px; letter-spacing:.2px}
    .panel .body{padding:16px}

    .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
    @media (max-width:980px){.grid{grid-template-columns:repeat(2,1fr)} input{min-width:180px}}
    @media (max-width:560px){.grid{grid-template-columns:1fr}}

    .ghostBtn{
      text-align:left; width:100%;
      border:1px solid var(--border2);
      background:linear-gradient(180deg, rgba(12,20,38,.82), rgba(12,20,38,.55));
      color:var(--text);
      border-radius:18px;
      padding:12px 12px;
      cursor:pointer;
      transition: transform .08s ease, border-color .2s ease, background .2s ease;
    }
    .ghostBtn:hover{
      transform: translateY(-1px);
      border-color: rgba(143,184,255,.45);
      background:linear-gradient(180deg, rgba(12,20,38,.92), rgba(12,20,38,.62));
    }
    .ghostBtn strong{font-size:14px; font-weight:900}

    .ghostView{margin-top:14px}
    .hidden{display:none !important}

    .ghostCard{
      padding:16px;
      border-radius:var(--radius);
      border:1px solid var(--border);
      background:linear-gradient(180deg, rgba(12,18,34,.72), rgba(12,18,34,.55));
      box-shadow:var(--shadow);
    }
    .ghostHeader{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap}
    .ghostHeader h2{margin:0;font-size:18px; letter-spacing:.2px}
    .back{
      border:1px solid var(--border);
      background:rgba(15,22,40,.62);
      color:var(--text);
      border-radius:14px;
      padding:9px 12px;
      cursor:pointer;
      font-weight:800;
    }
    .back:hover{border-color:rgba(143,184,255,.45)}

    .sections{display:grid;grid-template-columns:1.2fr .8fr;gap:14px;margin-top:14px}
    @media (max-width:980px){.sections{grid-template-columns:1fr}}

    .sec{
      border:1px solid var(--border2);
      border-radius:18px;
      background:rgba(10,14,24,.55);
      overflow:hidden;
    }
    .sec h3{
      margin:0;
      padding:12px 14px;
      font-size:14px;
      font-weight:950;
      letter-spacing:.2px;
      background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,0));
      border-bottom:1px solid var(--border2);
    }
    .sec .content{padding:12px 14px}

    ul{margin:0; padding-left:18px}
    li{margin:8px 0; line-height:1.55; color:rgba(232,238,252,.95)}
    li::marker{color:rgba(143,184,255,.65)}
    .sublist{margin-top:8px}

    .chip{
      display:inline-flex; align-items:center;
      padding:2px 8px;
      border-radius:999px;
      border:1px solid var(--chipBorder);
      background:var(--chipBg);
      color:rgba(232,238,252,.95);
      font-size:12px;
      font-family:var(--mono);
      letter-spacing:.1px;
      transform: translateY(-1px);
      margin:0 2px;
      white-space:nowrap;
    }
    .num{
      font-family:var(--mono);
      background:rgba(255,255,255,.06);
      border:1px solid var(--border2);
      border-radius:10px;
      padding:1px 6px;
      margin:0 2px;
      white-space:nowrap;
    }
    .hl{color:rgba(232,238,252,.98); font-weight:900}

    .imgBox{border:1px solid var(--border2); border-radius:18px; overflow:hidden; background:rgba(10,14,24,.45)}
    .imgBox img{display:block; width:100%; height:auto}
    .imgCap{padding:10px 12px; font-size:12px; color:var(--muted); border-top:1px solid var(--border2)}

    dialog::backdrop{background:rgba(0,0,0,.62)}
    dialog{border:1px solid var(--border); border-radius:18px; padding:0; background:rgba(7,10,16,.92); color:var(--text); max-width:min(92vw, 960px)}
    .dlgHead{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 14px;border-bottom:1px solid var(--border2)}
    .dlgBody{padding:12px}
    .dlgBody img{width:100%;height:auto;display:block;border-radius:12px}
    .xbtn{border:1px solid var(--border); background:rgba(15,22,40,.62); color:var(--text);
      border-radius:14px; padding:8px 12px; cursor:pointer; font-weight:900}
  
    /* Animated decorations */
    body::before, body::after{
      content:"";
      position:fixed;
      inset:-20%;
      pointer-events:none;
      z-index:-4;
      background:
        radial-gradient(600px 420px at 15% 20%, rgba(143,184,255,.22), transparent 60%),
        radial-gradient(560px 420px at 85% 25%, rgba(134,255,214,.16), transparent 60%),
        radial-gradient(520px 420px at 55% 80%, rgba(143,184,255,.10), transparent 60%);
      filter: blur(18px);
      opacity:.9;
      transform: translate3d(0,0,0);
      animation: floatGlow 14s ease-in-out infinite;
    }
    body::after{
      opacity:.55;
      filter: blur(28px);
      animation-duration: 18s;
      animation-direction: reverse;
    }
    @keyframes floatGlow{
      0%{transform: translate3d(-1.5%, -1%, 0) scale(1);}
      50%{transform: translate3d(1.5%, 1.2%, 0) scale(1.02);}
      100%{transform: translate3d(-1.5%, -1%, 0) scale(1);}
    }

    /* Page transitions */
    .pageFadeIn{ animation: pageFadeIn .18s ease-out both; }
    .pageFadeOut{ animation: pageFadeOut .16s ease-in both; }
    @keyframes pageFadeIn{ from{opacity:0; transform: translateY(6px);} to{opacity:1; transform: translateY(0);} }
    @keyframes pageFadeOut{ from{opacity:1; transform: translateY(0);} to{opacity:0; transform: translateY(6px);} }

    /* Section reveal */
    .sec{ transform: translateY(4px); opacity:.0; }
    .sec.revealed{ animation: secIn .22s ease-out both; }
    @keyframes secIn{ from{opacity:0; transform: translateY(8px);} to{opacity:1; transform: translateY(0);} }

  
    
    /* Background layers */
    #dustCanvas{
      position:fixed;
      inset:0;
      width:100vw;
      height:100vh;
      z-index:-2; /* behind content, above base gradients */
      pointer-events:none;
      opacity:1;
    }
    #fogLayer{
      position:fixed;
      inset:-15%;
      z-index:-4; /* above particles, still behind content */
      pointer-events:none;
      background:
        radial-gradient(700px 520px at 20% 30%, rgba(255,255,255,.05), transparent 60%),
        radial-gradient(900px 620px at 80% 35%, rgba(143,184,255,.06), transparent 62%),
        radial-gradient(800px 600px at 55% 75%, rgba(200,120,255,.05), transparent 60%);
      filter: blur(26px);
      opacity:.55;
      transform: translate3d(0,0,0);
      animation: fogDrift 22s ease-in-out infinite;
      mix-blend-mode: screen;
    }
    @keyframes fogDrift{
      0%{transform: translate3d(-1.2%, -0.6%, 0) scale(1.02);}
      50%{transform: translate3d(1.4%, 0.9%, 0) scale(1.05);}
      100%{transform: translate3d(-1.2%, -0.6%, 0) scale(1.02);}
    }
    header, main{ position:relative; z-index:1; }

  
    @keyframes logoGlow{
      0%{box-shadow:0 0 14px rgba(106,168,255,.42),0 0 26px rgba(200,120,255,.20),0 0 26px rgba(134,255,214,.16);}
      50%{box-shadow:0 0 26px rgba(106,168,255,.75),0 0 44px rgba(200,120,255,.36),0 0 40px rgba(134,255,214,.30);}
      100%{box-shadow:0 0 14px rgba(106,168,255,.42),0 0 26px rgba(200,120,255,.20),0 0 26px rgba(134,255,214,.16);}
    }
    @keyframes logoShift{
      0%{background-position:0% 50%;}
      50%{background-position:100% 50%;}
      100%{background-position:0% 50%;}
    }
  
    .mediaCap{
      margin: 0 0 10px 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }

  </style>
</head>
<body>
<canvas id="dustCanvas" aria-hidden="true"></canvas>
<div id="fogLayer" aria-hidden="true"></div>
<header>
  <div class="wrap">
    <div class="top">
      <div class="brand">
        <div class="logo"></div>
        <div>
          <h1 id="appTitle">Ghost Guide</h1>
          <div class="subtitle" id="appSub">Выбор призрака</div>
        </div>
      </div>
      <div class="controls">
        <button class="pill" id="btnRu" aria-pressed="true">RU</button>
        <button class="pill" id="btnEn" aria-pressed="false">EN</button>
        <input id="search" placeholder="Поиск по названию…" />
      </div>
    </div>
  </div>
</header>

<main>
  <div class="wrap">
    <section class="panel" id="home">
      <div class="head">
        <div class="title" id="homeTitle">Выбор призрака</div>
      </div>
      <div class="body">
        <div class="grid" id="ghostGrid"></div>
      </div>
    </section>

    <section class="ghostView hidden" id="detail"></section>
  </div>
</main>

<dialog id="imgDlg">
  <div class="dlgHead">
    <div id="dlgTitle" style="font-weight:900;font-size:13px">Image</div>
    <button class="xbtn" id="dlgClose">✕</button>
  </div>
  <div class="dlgBody">
    <img id="dlgImg" alt="" />
    <div class="imgCap" id="dlgCap"></div>
  </div>
</dialog>

<script>
const GHOSTS = [{"id": "banshee", "ru": {"name": "Банши", "sections": {"Особенности": ["В начале игры назначает случайного игрока своей Целью.", "Выбирает состояние, ориентируясь на рассудок Цели, а не на средний.", "Во время охоты обращает внимание только на Цель, если она жива и находится в зоне расследования; остальных игнорирует."], "Смена цели": ["Если любой игрок умирает, Банши выбирает новую Цель (исключение: смерть из‑за желания Обезьяньей лапки «Хочу оживить моего друга» — тогда смены может не быть).", "Если пытается начать обычную (не проклятую) охоту без Цели, то сначала назначит новую Цель, провалит попытку охоты и сразу перейдёт в состояние любимой комнаты.", "Новой Целью становится живой игрок, который первым зашёл в лобби. Если подходящего нет — смены нет."], "Способности": ["Для короткого блуждания и лазерной проекции с шансом 66.7% выбирает позицию, отталкиваясь от местоположения Цели (если она в зоне расследования)."], "Гост-ивенты": ["Шанс поющего гост-ивента — 46.6% вместо 20%.", "Если поющий ивент получает Цель, то при столкновении рассудок падает на 15% вместо 10%."], "Длинное блуждание": ["Шанс длинного блуждания всегда 50%.", "Может делать длинное блуждание даже вне любимой комнаты."], "Другое": ["Всегда женская модель.", "С шансом 33.3% даёт уникальный паранормальный звук."]}}, "en": {"name": "Banshee", "sections": {"Traits": ["At the start of the game, it assigns a random player as its Target.", "It chooses states based on the Target’s sanity, not the team average.", "During hunts it focuses only on the Target if the Target is alive and inside the investigation area; other players are ignored."], "Target switching": ["If any player dies, it picks a new Target (exception: death caused by Monkey Paw wish “I wish to revive my friend” may prevent switching).", "If it attempts a normal (non-cursed) hunt without a Target, it will pick a new Target, fail the hunt attempt, and immediately enter its favorite-room state.", "The new Target is the living player who joined the lobby first; if none exists, the Target does not change."], "Abilities": ["For Short Roam and Laser Projection, there is a 66.7% chance it chooses a position relative to the Target (if the Target is inside the investigation area)."], "Ghost events": ["Singing ghost event chance is 46.6% instead of 20%.", "If the Target gets the Singing event, collision drains 15% sanity instead of 10%."], "Long roam": ["Long Roam chance is always 50%.", "It can Long Roam even outside the favorite room."], "Other": ["Always uses a female model.", "Has a 33.3% chance to produce a unique paranormal sound."]}}}, {"id": "dayan", "ru": {"name": "Dayan", "sections": {"Особенности": ["Если в пределах зоны расследования в радиусе 10 м от призрака есть живые игроки, эффект зависит от действий ближайшего игрока:", "— Если игрок не двигается: порог охоты по среднему рассудку 45% (вместо 50%), скорость на охоте 1.2 м/с (вместо 1.7).", "— Если игрок двигается: порог охоты 65% (вместо 50%), скорость на охоте 2.25 м/с (вместо 1.7).", "В варианте с движением скорость фиксированная и перекрывает ускорение."], "Другое": ["Всегда женская модель."]}}, "en": {"name": "Dayan", "sections": {"Traits": ["If there are living players within 10 meters (inside the investigation area), the closest player’s actions modify the ghost:", "— If the player stands still: average-sanity hunt threshold becomes 45% (instead of 50%), hunt speed becomes 1.2 m/s (instead of 1.7).", "— If the player moves: hunt threshold becomes 65% (instead of 50%), hunt speed becomes 2.25 m/s (instead of 1.7).", "In the moving case, speed is fixed and overrides acceleration."], "Other": ["Always uses a female model."]}}}, {"id": "deogen", "ru": {"name": "Деоген", "sections": {"Охота": ["Во время охоты видит игроков независимо от препятствий.", "Периодически выбирает ближайшего живого игрока в зоне расследования, которого преследует: в начале охоты, затем через 10 секунд, далее каждые 5–10 секунд.", "Скорость 3 м/с, если длина пути до цели больше 6 м. Иначе скорость = (длина пути) × 0.15, но не ниже 0.4 м/с.", "Под охотным эффектом благовония скорость зависит от произведения модификаторов (скорость по сложности × кровавая луна × благовоние T2 × соль T3): при множителе ≤ 1: 0.4 м/с × множитель; при > 1: 1.6 м/с × множитель.", "Ускорения не имеет.", "На дистанции 1.1–1.5 м убивает игрока, если тот непрерывно находится в радиусе 2 секунды (вместо 1 секунды)."], "Мерцания": ["Мерцания на охоте отличаются от стандартных."], "Другое": ["Если хост не достиг 30 уровня (0 престижа), этот призрак не встречается.", "Порог охоты по среднему рассудку 40% вместо 50%.", "Шанс взаимодействия с дверью 30% вместо 25%.", "Если задать вопрос в радиоприёмник в радиусе 1 м, с шансом 33% ответом будет уникальное «дыхание»."]}}, "en": {"name": "Deogen", "sections": {"Hunt": ["During hunts it can see players regardless of obstacles.", "It periodically selects the closest living player in the investigation area to chase: at hunt start, then after 10 seconds, then every 5–10 seconds.", "Speed is 3 m/s if the path length to the chased player is over 6 m. Otherwise: speed = path length × 0.15, with a minimum of 0.4 m/s.", "Under incense hunt-effect, speed depends on the product of modifiers (difficulty ghost speed × Blood Moon × Incense T2 × Salt T3): if multiplier ≤ 1: 0.4 m/s × multiplier; if > 1: 1.6 m/s × multiplier.", "No acceleration.", "At 1.1–1.5 m, it kills a player who stays continuously in that range for 2 seconds (instead of 1 second)."], "Blinking": ["Its hunt blinking differs from standard ghosts."], "Other": ["If the host is below level 30 (0 prestige), this ghost cannot appear.", "Average-sanity hunt threshold is 40% instead of 50%.", "Door interaction chance is 30% instead of 25%.", "If you ask a Spirit Box question within 1 m, there is a 33% chance the reply is a unique breathing sound."]}}}, {"id": "demon", "ru": {"name": "Демон", "sections": {"Охота": ["Порог охоты по среднему рассудку 70% вместо 50%.", "Безопасное время после охоты 20 секунд вместо 25.", "Эффект благовония длится 60 секунд вместо 90.", "Радиус распятия увеличен на 50%: 1 тир — 4.5 м, 2 тир — 6 м, 3 тир — 7.5 м.", "Используя способность, входит в охоту независимо от рассудка."]}}, "en": {"name": "Demon", "sections": {"Hunt": ["Average-sanity hunt threshold is 70% instead of 50%.", "Post-hunt safety time is 20 seconds instead of 25.", "Incense effect lasts 60 seconds instead of 90.", "Crucifix range is increased by 50%: Tier 1 — 4.5 m, Tier 2 — 6 m, Tier 3 — 7.5 m.", "Its ability can force a hunt regardless of sanity."]}}}, {"id": "gallu", "ru": {"name": "Галлу", "sections": {"Состояния": ["Имеет 3 состояния: Обычное, Разгневанное, Ослабленное. Начинает в Обычном состоянии."], "Разгневанное": ["Порог охоты 60% вместо 50%.", "Скорость на охоте ×1.15 = 1.955 м/с.", "Радиус распятия −2 м: 1 тир — 1 м, 2 тир — 2 м, 3 тир — 3 м.", "Благовоние (охотный эффект) 4 секунды (−1 сек).", "Проходя через соль, не наступает на неё."], "Ослабленное": ["Порог охоты 40% вместо 50%.", "Скорость на охоте ×0.8 = 1.36 м/с.", "Радиус распятия +1 м: 1 тир — 4 м, 2 тир — 5 м, 3 тир — 6 м.", "Благовоние (охотный эффект) 6 секунд (+1 сек).", "Соль 3 тира (охотный эффект) 3 секунды (+1 сек)."], "Смена состояния": ["Пытается изменить состояние с задержкой после благовония/соли/срабатывания распятия; пока действует задержка, новые попытки не ставятся.", "Если был в Обычном — меняется на Разгневанное (считается псевдо‑способностью). Если был в Ослабленном — на Обычное. Если был в Разгневанном — без изменений.", "После завершения охоты (не из‑за распятия), если был Разгневанным, становится Ослабленным.", "Для не‑хоста: после применения благовония призрак больше не будет наступать на соль, независимо от состояния."]}}, "en": {"name": "Gallu", "sections": {"States": ["Has 3 states: Normal, Enraged, Weakened. Starts in Normal."], "Enraged": ["Hunt threshold 60% instead of 50%.", "Hunt speed ×1.15 = 1.955 m/s.", "Crucifix range −2 m: Tier 1 — 1 m, Tier 2 — 2 m, Tier 3 — 3 m.", "Incense hunt-effect 4 seconds (−1 s).", "Will not step on salt when passing through it."], "Weakened": ["Hunt threshold 40% instead of 50%.", "Hunt speed ×0.8 = 1.36 m/s.", "Crucifix range +1 m: Tier 1 — 4 m, Tier 2 — 5 m, Tier 3 — 6 m.", "Incense hunt-effect 6 seconds (+1 s).", "Salt Tier 3 hunt-effect 3 seconds (+1 s)."], "State switching": ["Attempts to switch states with delays after incense/salt/crucifix; while a delay is active, no new switch attempts are queued.", "Normal → Enraged (pseudo‑ability). Weakened → Normal. Enraged → no change.", "After a hunt ends (not via crucifix), if it was Enraged, it becomes Weakened.", "For non-host players: after incense, it stops stepping on salt regardless of state."]}}}, {"id": "goryo", "ru": {"name": "Горё", "sections": {"Блуждание": ["Имеет пониженный шанс войти в состояние блуждания.", "Не делает длинное блуждание и не меняет любимую комнату (кроме изменения через Обезьянью лапку).", "Если при блуждании находится в любимой комнате, то выйдет из состояния сразу."], "Лазерная проекция": ["Для входа в лазерную проекцию, кроме улики, должен быть в любимой комнате, и в этой комнате не должно быть живых игроков.", "Шанс войти в лазерную проекцию при входе в блуждание — 66.7% вместо 33.3%. Также есть дополнительный шанс сразу после бездействия.", "Если в зоне расследования есть живые игроки, позиция выбирается в сфере 1 м вместо 2 м.", "Для обнаружения в лазерной проекции дополнительно требуется видеокамера."]}}, "en": {"name": "Goryo", "sections": {"Roaming": ["Has a lower chance to enter roaming.", "Cannot Long Roam and therefore cannot change its favorite room (except via Monkey Paw).", "If it roams while in the favorite room, it exits roaming immediately."], "Laser Projection": ["To enter Laser Projection (besides the evidence), it must be in its favorite room and have no living players in the same room.", "Chance to enter Laser Projection on roaming is 66.7% instead of 33.3%, with an extra chance right after inactivity.", "If there are living players in the investigation area, it picks positions within a 1 m sphere instead of 2 m.", "A video camera is additionally required to detect it in Laser Projection form."]}}}, {"id": "hantu", "ru": {"name": "Ханту", "sections": {"Скорость": ["Скорость на охоте зависит от температуры комнаты: [15;20]°C — 1.4 м/с; [12;15) — 1.75; [9;12) — 2.1; [6;9) — 2.3; [3;6) — 2.4; [0;3) — 2.5; [−10;0) — 2.7.", "Ускорения не имеет."], "Щиток": ["В 2 раза выше шанс войти в состояние щитка.", "Попытка включить щиток всегда провальная.", "Если щиток выключен или сломан, на охоте каждые 3 секунды появляется ледяное дыхание (мёртвый игрок не видит, кроме охоты, на которой умер при включённом продлении)."]}}, "en": {"name": "Hantu", "sections": {"Speed": ["Hunt speed depends on room temperature: [15,20]°C — 1.4 m/s; [12,15) — 1.75; [9,12) — 2.1; [6,9) — 2.3; [3,6) — 2.4; [0,3) — 2.5; [−10,0) — 2.7.", "No acceleration."], "Breaker": ["Has double the chance to enter a breaker-related state.", "Attempts to turn the breaker on always fail.", "If the breaker is off or broken, it emits icy breath every 3 seconds during hunts (dead players don’t see it except on the hunt they died in, if hunts are extended)."]}}}, {"id": "jinn", "ru": {"name": "Джинн", "sections": {"Щиток": ["Попытка выключить щиток всегда провальная."], "Способности": ["Способность не срабатывает, если щиток выключен или сломан. Иначе запускается таймер 5 секунд, после чего:", "Проверяет игроков (включая мёртвых) в радиусе 3 м от призрака или в одной комнате с ним. Если они есть — снижает рассудок на 25% тому, кто первым зашёл в лобби.", "При успешном снижении рассудка на щитке появляется ЭМП 2, а с шансом 33% — ЭМП 5 (если улика не скрыта)."], "Охота": ["Во время охоты, если щиток включён, призрак видит игрока и находится дальше 3 м — скорость 2.5 м/с вместо 1.7.", "Скорость фиксированная и перекрывает ускорение."]}}, "en": {"name": "Jinn", "sections": {"Breaker": ["Attempts to turn the breaker off always fail."], "Abilities": ["Ability fails if the breaker is off or broken. Otherwise it starts a 5-second timer, then:", "Checks for players (including dead) within 3 m or in the same room. If any are found, it drains 25% sanity from the player who joined the lobby first.", "On a successful drain it creates EMF 2 at the breaker, with a 33% chance for EMF 5 (if evidence is not hidden)."], "Hunt": ["During hunts, if the breaker is on and it sees a player farther than 3 m, speed becomes 2.5 m/s instead of 1.7.", "Speed is fixed and overrides acceleration."]}}}, {"id": "mare", "ru": {"name": "Мара", "sections": {"Взаимодействие": ["Попытка взаимодействия, чтобы переключить выключатель, который выключен или связан с разбитыми лампами, всегда провальная.", "При взаимодействии с выключателем не пытается мерцать лампами; зато чаще пытается переключать свет."], "Гост-ивент": ["Шанс лопающего гост-ивента 11% вместо 6.7%."], "Порог": ["Обычно порог охоты 60% вместо 50%."], "Влияние света": ["Если находится в комнате с целыми лампами и включённым выключателем — порог охоты 40%.", "Если это выключатель основного освещения: шанс длинного блуждания 50% и может делать длинное блуждание вне любимой комнаты.", "Компьютеры и телевизоры не влияют."], "Способности": ["Если игрок включает выключатель в радиусе 4 м от призрака (на том же этаже) и он связан с целыми лампами, то с шансом 14.3% он выключится через 0.05–1 сек, оставив ЭМП 2 на выключателе.", "У каждого выключателя есть перезарядка 10 секунд для каждого игрока после переключения.", "Не использует способность на компьютерах и пультах ТВ (кроме 2 пультов на чердаке Bleasdale)."]}}, "en": {"name": "Mare", "sections": {"Interactions": ["Attempts to toggle a switch that is off or linked to broken bulbs always fail.", "When interacting with a switch, it won’t attempt light flickers, but it tries to toggle switches more often."], "Ghost event": ["Burst ghost event chance is 11% instead of 6.7%."], "Threshold": ["Base hunt threshold is 60% instead of 50%."], "Light influence": ["If it is in a room with unbroken lights and the switch is on, hunt threshold becomes 40%.", "If it’s the main light switch: Long Roam chance is 50%, and it can Long Roam outside its favorite room.", "Computers and TVs do not affect this."], "Abilities": ["If a player turns on a switch within 4 m (same floor) linked to unbroken lights, there is a 14.3% chance it flips back off after 0.05–1 s and leaves EMF 2 on the switch.", "Each switch has a per-player 10-second cooldown after toggling.", "Does not use this on computers or TV remotes (except two remotes in Bleasdale attic)."]}}}, {"id": "moroi", "ru": {"name": "Морой", "sections": {"Проклятие": ["Может наложить проклятие на игрока, который получил ответ в радиоприёмник, услышал звук в параболический микрофон или начал записывать любой звук звукозаписывающим устройством.", "Пассивное истощение рассудка у проклятого игрока увеличивается в 2 раза.", "Основное освещение комнаты не предотвращает падение рассудка у проклятого игрока.", "Снять проклятие можно только успокоительным."], "Охота": ["Время действия охотного эффекта благовония 7 секунд (+2 секунды).", "Скорость зависит от среднего рассудка живых игроков (обновление каждые 2 секунды): [45;100]% — 1.5; [40;45) — 1.583; [35;40) — 1.66; [30;35) — 1.749; [25;30) — 1.832; [20;25) — 1.915; [15;20) — 1.998; [10;15) — 2.081; [5;10) — 2.164; [0;5) — 2.25 (м/с)."]}}, "en": {"name": "Moroi", "sections": {"Curse": ["Can curse a player who gets a Spirit Box reply, hears a sound via Parabolic Mic, or starts recording any sound.", "The cursed player’s passive sanity drain is doubled.", "Main room lighting does not prevent the cursed player’s sanity loss.", "The curse can only be removed by taking sanity medication."], "Hunt": ["Incense hunt-effect lasts 7 seconds (+2 seconds).", "Speed depends on the living players’ average sanity (updates every 2 seconds): [45,100]% — 1.5; [40,45) — 1.583; [35,40) — 1.66; [30,35) — 1.749; [25,30) — 1.832; [20,25) — 1.915; [15,20) — 1.998; [10,15) — 2.081; [5,10) — 2.164; [0,5) — 2.25 (m/s)."]}}}, {"id": "myling", "ru": {"name": "Мюлинг", "sections": {"Паранормальный звук": ["Издаёт паранормальный звук каждые 64–127 секунд вместо 80–127."], "Охота": ["Во время охоты шаги и звук призрака слышны в радиусе 12 м вместо 20 м, поэтому он тише большинства."]}}, "en": {"name": "Myling", "sections": {"Paranormal sound": ["Produces a paranormal sound every 64–127 seconds instead of 80–127."], "Hunt": ["During hunts, its footsteps and ghost audio are audible only within 12 m instead of 20 m, making it quieter than most."]}}}, {"id": "obake", "ru": {"name": "Обакэ", "sections": {"Отпечатки": ["С шансом 25% не оставляет ультрафиолет на поверхности.", "При прохождении через соль, кроме отпечатка, может не быть и звука шага. Во время ходячего гост‑ивента таким же образом может пропускать звук шага.", "Используя способность, сокращает время отображения текущих отпечатков в 2 раза.", "С шансом 16.7% оставляет уникальный отпечаток с дополнительным пальцем."], "Смена модельки": ["Во время охоты может на одно мерцание сменить модель призрака того же пола (псевдо‑способность).", "Смена облика идёт по циклу: мужские 1→7, женские 1→4.", "Паттерн смены: 12 | 15 | 12 | 15 | 8 | 18 | 25 | 15 появлений; после 120 появлений (8 смен) цикл идёт обратно по кругу.", "Примерные тайминги 1–8 смен: 00:07 | 00:16 | 00:24 | 00:33 | 00:37 | 00:49 | 01:04 | 01:13.", "Счётчик до следующей смены сбрасывается после охоты.", "Во время смены облика призрак визуально «замирает»; некоторые женские скины могут дополнительно лечь/встать или прогнуться назад."]}, "images": [{"src": "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAkkAAAFMCAYAAADfpSgaAAEAAElEQVR4nKz92a8vS5bfh31WRGb+hj2e8d66t+pWdXVVdVeTTXY3KbIJUeIgEZIB2QIEC4Rl+8GAXgT4yYD+Af8dfrAfZMAyYBsWbJAQRVKi1S2SzZ7ZXT1Udd2qutOZ9/QbMjMi/LBiRUTuc4pSdzGrzt17/36ZkTGsWOu7xpBvfOPbiXw9kf8jIg4nDkG4G+8 , а если ивент вызван картой Таро “The Devil” — 60% (вместо 20% в обоих случаях).", "В 2 раза чаще проявляется на ивенте в полной форме (66.7%)."], "Мерцания": ["Мерцания на охоте отличаются от стандартных."]}}, "en": {"name": "Oni", "sections": {"Activity": ["Activity increases by 30 if a living player is in the same room or within 6 m on the same floor."], "Ghost events": ["Ghost events drain 20% sanity instead of 10%.", "A Singing event drains 10% if the player does not look at the ghost on collision.", "Cannot do the airball event.", "Walking event chance is 40%, or 60% if triggered by Tarot “The Devil” (instead of 20% in both cases).", "Twice as likely to appear in full form during events (66.7%)."], "Blinking": ["Hunt blinking differs from standard ghosts."]}}}, {"id": "onryo", "ru": {"name": "Онрё", "sections": {"Порог": ["Обычно порог охоты 60% вместо 50%."], "Влияние огня": ["Если рядом (в радиусе 4 м на одном этаже) есть горящий источник огня, порог охоты становится 40%.", "Пытаясь начать обычную охоту, потушит этот огонь, провалив попытку охоты и сразу войдя в состояние любимой комнаты.", "Попытка зажечь источник огня будет провальной, если не используется кукла Вуду."], "Способности": ["Имеет цикл тушений источников огня.", "После бездействия входит в охоту, если: в цикле тушений ≥ 3; третье тушение произошло вне охоты и вне эффекта благовония (иначе цикл сбросится раньше); на призрака не действует благовоние; отсутствует безопасное время после охоты. После этого цикл сбрасывается."], "Частота тушения": ["С ростом числа мёртвых игроков попытка тушения происходит чаще и с большим шансом: 1 — каждые 20–60 сек (75%); 2 — каждые 20–40 сек (80%); 3 — каждые 20 сек (83.3%)."]}}, "en": {"name": "Onryo", "sections": {"Threshold": ["Base hunt threshold is 60% instead of 50%."], "Fire influence": ["If there is a lit fire source within 4 m on the same floor, hunt threshold becomes 40%.", "When attempting a normal hunt, it will extinguish that fire, fail the hunt attempt, and immediately enter favorite-room state.", "Attempts to light a fire source always fail unless a Voodoo Doll is used."], "Abilities": ["Has a fire-extinguish cycle.", "After inactivity it enters a hunt if: extinguish count ≥ 3; the 3rd extinguish happened outside a hunt and outside incense effect (otherwise the cycle resets early); incense has no effect; there is no post-hunt safety time. The cycle then resets."], "Extinguish frequency": ["With more dead players, extinguish attempts happen more often and with higher chance: 1 — every 20–60 s (75%); 2 — every 20–40 s (80%); 3 — every 20 s (83.3%)."]}}}, {"id": "phantom", "ru": {"name": "Фантом", "sections": {"Исчезновение": ["Если при проявлении будет сфотографирован или записан на видео, то визуально исчезнет: пропадёт сердцебиение и помехи от активной электроники и глобального чата. На медиа‑фрагменте также не будет видно призрака и помех.", "Во время охоты: исчезает только на одно мерцание и только если сфотографирован; сердцебиение не исчезает; помехи перестают издавать только фотоаппараты, видеокамеры и звукозаписывающие устройства.", "Запись на видео будет недоступна, если ранее на этой охоте уже был сфотографирован."], "Способность": ["Выбирает случайного игрока (может быть мёртвый), затем точку в сфере 1–5 м от него и внутри сферы ищет ближайшую проходимую позицию для призрака.", "Если позиция не найдена — способность провальная. Иначе выбранная позиция становится точкой назначения.", "Если расстояние до точки назначения < 1 м, выйдет из состояния и создаст ЭМП 2 на уровне головы."], "Истощение рассудка": ["Снижает рассудок каждую секунду на 0.5% у игроков, слышащих сердцебиение при проявлении."], "Мерцания": ["Мерцания на охоте отличаются от стандартных."]}}, "en": {"name": "Phantom", "sections": {"Vanishing": ["If photographed or recorded on video during a manifestation, it visually disappears: heartbeat and interference from active electronics/global chat stop. The captured media won’t show the ghost or static.", "During hunts: it disappears for one blink only when photographed; heartbeat remains; only cameras/recorders stop producing interference.", "Video recording becomes unavailable if it has already been photographed in the current hunt."], "Ability": ["Selects a random player (can be dead), then a point within 1–5 m around them and finds the nearest walkable position for the ghost inside that sphere.", "If no position is found, the ability fails. Otherwise, that position becomes the destination.", "If the destination is within 1 m, it exits the state and creates EMF 2 at head level."], "Sanity drain": ["Drains 0.5% sanity per second from players who can hear its heartbeat during a manifestation."], "Blinking": ["Hunt blinking differs from standard ghosts."]}}}, {"id": "poltergeist", "ru": {"name": "Полтергейст", "sections": {"Броски": ["Обычно сила броска: 2–6 по горизонтали и 3–6 по вертикали (вместо 1–3 и 1–5).", "Сила броска предмета в ближайшего игрока — 15 вместо 10.", "В состоянии взаимодействия есть дополнительный шанс 20% на бросок предмета.", "Во время охоты шанс на бросок 100% вместо 50%."], "Способность": ["Используя способность, бросает все предметы в области взаимодействий (даже при включённом свете).", "Тип броска и длительность левитации одинаковы для всех предметов.", "Левитация длится 1–3 секунды (вместо 0.5–2).", "Не может бросить блокнот.", "Снижает рассудок игроков (включая мёртвых) в одной комнате с призраком на 2% за каждый брошенный предмет.", "Создаёт ЭМП 2 в своём местоположении на уровне головы."]}}, "en": {"name": "Poltergeist", "sections": {"Throws": ["Typical throw force: 2–6 horizontally and 3–6 vertically (instead of 1–3 and 1–5).", "Throw force toward the nearest player is 15 instead of 10.", "While in an interaction state, it has an extra 20% chance to throw an item.", "During hunts, throw chance is 100% instead of 50%."], "Ability": ["When its ability triggers, it throws all items in the interaction area (even if lights are on).", "Throw type and levitation duration are the same for all thrown items.", "Levitation lasts 1–3 seconds (instead of 0.5–2).", "It cannot throw the book.", "Drains 2% sanity per thrown item from players (including dead) in the same room.", "Creates EMF 2 at its location at head height."]}}}, {"id": "raiju", "ru": {"name": "Райдзю", "sections": {"Влияние электроники": ["Если рядом (6/8/10 м в зависимости от карты) есть включённая электроника, скорость на охоте 2.5 м/с вместо 1.7; скорость фиксированная и перекрывает ускорение.", "Если электроника у игрока, порог охоты 65% вместо 50%.", "Крепление на голову 2 тира (фонарь) влияет даже если фонари отключены в настройках сложности."], "Помехи и сердцебиение": ["При проявлении создаёт помехи у включённого оборудования и глобального чата в радиусе 15 м вместо 10 м.", "Сердцебиение слышно на 13.8 м вместо 9.2 м."]}}, "en": {"name": "Raiju", "sections": {"Electronics influence": ["Near powered electronics (6/8/10 m depending on map size), hunt speed becomes 2.5 m/s instead of 1.7; speed is fixed and overrides acceleration.", "If the electronics are carried by a player, hunt threshold becomes 65% instead of 50%.", "Tier 2 head-mounted flashlight counts even if flashlights are disabled by difficulty."], "Interference & heartbeat": ["During manifestations it causes interference within 15 m instead of 10 m.", "Heartbeat is audible up to 13.8 m instead of 9.2 m."]}}}, {"id": "revenant", "ru": {"name": "Ревенант", "sections": {"Скорость": ["Во время охоты, если местоположение игрока неизвестно, снижает скорость каждую секунду на 0.75 м/с до минимума 1 м/с.", "Если местоположение игрока известно, скорость 3 м/с.", "Ускорения не имеет."]}}, "en": {"name": "Revenant", "sections": {"Speed": ["During hunts, if player location is unknown, its speed drops by 0.75 m/s each second down to a minimum of 1 m/s.", "If player location is known, speed is 3 m/s.", "No acceleration."]}}}, {"id": "shade", "ru": {"name": "Тень", "sections": {"Гост-ивент": ["Если не используется карта Таро “The Devil”, успех попытки гост‑ивента зависит от среднего рассудка: шанс = (100 − средний рассудок) × 2 (округление вниз).", "Не может дать поющий ивент и проявление. Шанс ивента «облачко» 60% (вместо 20% обычно и 40% при “The Devil”).", "В 2 раза выше шанс проявиться в теневой форме на ивенте (66.7%)."], "Влияние игроков": ["Если в одной комнате с живым игроком, не сможет выполнять: взаимодействие, способность, щиток, а также (без проклятого предмета) охоту и гост‑ивент — вместо этого выбирает состояние любимой комнаты.", "Попытки потушить огонь и написать в блокнот будут провальными."], "Проклятые предметы": ["С шансом 50% ивент, вызванный кругом призыва, музыкальной шкатулкой или обезьяньей лапкой, будет в теневой форме."], "Другое": ["Максимальное значение случайной способности увеличено на 50% (активность в итоге ниже).", "Порог охоты 35% вместо 50%.", "Попытка броска предмета в ближайшего игрока всегда провальная."]}}, "en": {"name": "Shade", "sections": {"Ghost events": ["If Tarot “The Devil” is not used, event success depends on average sanity: chance = (100 − average sanity) × 2 (rounded down).", "Cannot do Singing events or Manifestations. Airball event chance is 60% (instead of 20% normally and 40% with “The Devil”).", "Has a higher chance to appear in Shadow form during events (66.7%)."], "Player influence": ["If a living player is in the same room, it cannot do interaction, ability, breaker state, and (without a cursed possession) hunts/events; instead it uses favorite-room behavior.", "Attempts to extinguish fire and write in the book fail."], "Cursed possessions": ["With 50% chance, events triggered by Summoning Circle, Music Box, or Monkey Paw will be in Shadow form."], "Other": ["Maximum random-ability value is increased by 50% (overall activity ends up lower).", "Hunt threshold is 35% instead of 50%.", "Throw attempt at the nearest player always fails."]}}}, {"id": "spirit", "ru": {"name": "Дух", "sections": {"Благовоние": ["Время действия эффекта благовония 180 секунд вместо 90."]}}, "en": {"name": "Spirit", "sections": {"Incense": ["Incense effect lasts 180 seconds instead of 90."]}}}, {"id": "thaye", "ru": {"name": "Тайэ", "sections": {"Возраст и механика старения": ["Имеет параметр «кол‑во старений», который определяет порог охоты по рассудку, скорость, множитель активности и шанс успешного гост‑ивента (если не используется карта Таро “The Devil”).", "Пытается стареть: успешно, если в одной комнате с призраком или в радиусе 3 м (в зоне расследования) есть живой игрок.", "Первая попытка — через 60 секунд после первого открытия входной двери. После провала — через 30 секунд. После успеха — через 60–120 секунд.", "Изменения применяются при смене состояния. Всего может стареть до 10 раз.", "При запросе возраста через доску Уиджи с каждым старением возраст увеличивается на 1–4.", "См. в таблице ↓"], "Другое": ["Шанс взаимодействия с дверью 30% вместо 25%.", "Входит в состояние охоты с шансом 25% (вместо 20% или 33%).", "Ускорения не имеет."]}, "images": [{"src": "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAagAAAFhCAYAAAAlVT68AAAAAXNSR0IArs4c6QAAAARnQU1BAACxjwv8YQUAAAAJcEhZcwAADsMAAA7DAcdvqGQAALg6SURBVHhe7N11dNRYG8Dh37h0Oi11gQp1Q1rcKe7O4u7uLO7u7m6L6y7uyy7ubsVailOBeuf7Y8rADLDyLdKWPOdwDnPvTaZNk7zJzc19RZ6efjoEAoFAIEhnxKYFAoFAIBCkB0KAEggEAkG6JAQogUAgEKRLog+fQeXOnYsbt24jQoRYkjljV5vWLWnXthVHjh6jW/deptWCdECj0XDk0F4AqlavzaNH4aZNMj1bW1t279wGQJlylXnx4oVpE4GJLp070qxpI/bs3cfP/QaZVgvSmdSUVHTo8PHy5Ny586bV8OEd1IgRQ1m3bjUKhSLTBieBQCAQpA9iiRiFQsG6dasZMWKoaTW8C1AeXp7Uq1fXtE4gEAgEgq+uXr26eHh5mhYjVqpUaLVa03KBQCAQCL4ZrVaLUqUyKhPL5HKjAoFAIBAIvgeZXI5EIjV8Fh42/UsymQwvL088PT1wc3XBzdUFe3s702YCgSCd0pqb4+frY/gcEOBv+H9gYADmGo3hs+D/IxKJEItFpsX/iEwuM/xfCFD/kq2tDQvmz2balAlMmzaJKVMmMHrUcNNmgm9IoVDg7u6Gm5srarVxF8GPJCQ4N66uLobPGo2GwoUKYmWVxajdj87C0oIyZUpB2om0UcN6hrqCBfJjbW31QWvBv2FnZ0fVKpUYOmQg3bp2Nq3+R77oHVSp0BJIpRIAalSvxojhQ2jcqAEi0f8XPdM7iUTC1SvXqFSlJtWq12HQ4OFksbRELP7Pm1Lwf3Cwt2fh/NkMG s 60 seconds after the front door opens, then every 30–120 seconds.", "Changes apply when it switches state."], "Mimic quirks": ["Does not copy the mimicked ghost’s evidence.", "Cannot mimic Banshee or Dayan if it is male.", "Mimic-Banshee starts with no Target.", "When mimicking Deogen/Oni/Phantom, non-host players see normal blinking.", "Non-host players cannot hear/record the Mimic-Deogen breathing reply.", "Can mimic Deogen even if the host is below level 30.", "When mimicking Mare, its ability won’t leave fingerprints on the switch.", "Incense duration for Mimic-Moroi is 5 seconds instead of 7.", "Moroi’s curse persists across changes; Mimic-Moroi cannot curse non-hosts.", "When mimicking Myling, non-hosts hear steps at the standard 20 m instead of 12 m.", "Keeps Obake’s shift order and Onryo’s fire cycle across mimics.", "Non-hosts don’t see Obake shifts or Hantu icy breath if it’s the Mimic.", "Mimics Obambo with a 50% chance in Aggressive state.", "When mimicking Raiju, heartbeat range stays the standard 9.2 m instead of 13.8 m.", "If it becomes Thaye, its age is random.", "Incense prevents hunts for the duration tied to the Mimic’s form at the moment incense is used, regardless of later changes."]}}}, {"id": "twins", "ru": {"name": "Близнецы", "sections": {"Взаимодействие": ["Когда пытаются совершить взаимодействие: 20% — псевдо‑способность (одно взаимодействие в обычной области и одно в большой с интервалом 1–2 сек); 30% — таймер 1–2 сек и затем взаимодействие в большой области (после старта таймера сразу выбирается следующее состояние); 50% — обычное взаимодействие.", "После взаимодействия в большой области она остаётся увеличенной, пока не совершит обычное взаимодействие; из‑за этого большая область может применяться во время охоты."], "Охота": ["При начале охоты с шансом 50% к скорости добавляется +0.2 (итог 1.9 м/с), иначе −0.2 (итог 1.5 м/с).", "Модификатор ±0.2 применяется после эффекта ускорения."]}}, "en": {"name": "The Twins", "sections": {"Intera const TERMS = {
  ru: ["Охоты", "Охота", "Порог", "Благовоние", "Распятие", "ЭМП", "Соль", "Щиток", "Любимой комнаты", "Цель", "Проклятую", "Проклятие", "Гост-ивент", "Длинное блуждание", "Блуждание", "Лазерной проекции", "Видеокамера", "Температуры", "Скорость", "Рассудок", "Кукла Вуду", "Доску Уиджи", "Карта Таро", "The Devil", "Обезьяньей лапки"],
  en: ["Hunt", "Hunts", "Threshold", "Incense", "Crucifix", "EMF", "Salt", "Breaker", "Favorite room", "Target", "Cursed", "Curse", "Ghost event", "Long Roam", "Roam", "Laser Projection", "Video camera", "Temperature", "Speed", "Sanity", "Voodoo Doll", "Ouija Board", "Tarot", "The Devil", "Monkey Paw"]
};

const I18N = {
  ru: {
    appTitle: "Ghost Guide",
    appSubHome: "Выбор призрака",
    appSubDetail: "Описание призрака",
    homeTitle: "Выбор призрака",
    searchPh: "Поиск по названию…",
    back: "← Назад к выбору",
  },
  en: {
    appTitle: "Ghost Guide",
    appSubHome: "Choose a ghost",
    appSubDetail: "Ghost details",
    homeTitle: "Choose a ghost",
    searchPh: "Search by name…",
    back: "← Back to list",
  }
};

let lang = localStorage.getItem("gg_lang") || "ru";
let currentId = null;

const $ = (s) => document.querySelector(s);
const grid = $("#ghostGrid");
const detail = $("#detail");
const home = $("#home");
const search = $("#search");

function setLang(next){
  lang = next;
  localStorage.setItem("gg_lang", lang);
  $("#btnRu").setAttribute("aria-pressed", String(lang==="ru"));
  $("#btnEn").setAttribute("aria-pressed", String(lang==="en"));
  $("#appTitle").textContent = I18N[lang].appTitle;
  $("#homeTitle").textContent = I18N[lang].homeTitle;
  search.placeholder = I18N[lang].searchPh;
  $("#appSub").textContent = currentId ? I18N[lang].appSubDetail : I18N[lang].appSubHome;
  renderHome();
  if(currentId) renderDetail(currentId);
}

function esc(s){
  return String(s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
}

function highlightInline(text){
  let t = String(text);

  // numbers + units
  t = t.replace(/(\b\d+(?:[\.,]\d+)?\b)(\s?(?:%|м\/с|m\/s|м|m|секунд|seconds|°C|C)\b)?/g, (m, num, unit) => {
    const u = unit ? unit : "";
    return `<span class="num">${esc(num + u)}</span>`;
  });

  // chips
  const list = (TERMS[lang] || []).slice().sort((a,b)=>b.length-a.length);
  list.forEach(term => {
    const safe = term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const re = new RegExp("(?<![\\wА-Яа-яЁё])(" + safe + ")(?![\\wА-Яа-яЁё])", "g");
    t = t.replace(re, `<span class="chip">$1</span>`);
  });

  // emphasize common starts
  t = t.replace(/^((Если|Иначе|When|If|Otherwise)\b)/, '<span class="hl">$1</span>');
  return t;
}

function animateSwap(hideEl, showEl){
  // Fade out hideEl (if visible), then swap
  if(hideEl && !hideEl.classList.contains("hidden")){
    hideEl.classList.remove("pageFadeIn");
    hideEl.classList.add("pageFadeOut");
  }
  // Ensure showEl is visible and fade in
  showEl.classList.remove("hidden");
  showEl.classList.remove("pageFadeOut");
  showEl.classList.add("pageFadeIn");
  // After a short time, hide the other one and cleanup
  setTimeout(() => {
    if(hideEl){
      hideEl.classList.add("hidden");
      hideEl.classList.remove("pageFadeOut");
    }
    showEl.classList.remove("pageFadeIn");
  }, 170);
}

function revealSections(){
  const secs = detail.querySelectorAll(".sec");
  secs.forEach((el, i) => {
    setTimeout(() => el.classList.add("revealed"), 40 + i*35);
  });
}

function renderHome(){
  const q = (search.value || "").trim().toLowerCase();
  grid.innerHTML = "";
  const list = GHOSTS.filter(g => {
    const name = (g[lang]?.name || g.ru?.name || "").toLowerCase();
    return !q || name.includes(q);
  });
  list.forEach(g => {
    const name = g[lang]?.name || g.ru?.name;
    const btn = document.createElement("button");
    btn.className = "ghostBtn";
    btn.innerHTML = `<strong>${esc(name)}</strong>`;
    btn.addEventListener("click", () => openGhost(g.id));
    grid.appendChild(btn);
  });
}

function openGhost(id){
  currentId = id;
  $("#appSub").textContent = I18N[lang].appSubDetail;
  // Render first so height is ready for the animation
  renderDetail(id);
  animateSwap(home, detail);
  window.scrollTo({top:0, behavior:"smooth"});
}

function closeGhost(){
  currentId = null;
  $("#appSub").textContent = I18N[lang].appSubHome;
  animateSwap(detail, home);
  window.scrollTo({top:0, behavior:"smooth"});
}

function renderDetail(id){
  const g = GHOSTS.find(x => x.id === id);
  if(!g) return;
  const name = g[lang]?.name || g.ru?.name;
  const sections = g[lang]?.sections || g.ru?.sections || {};
  const imgs = g[lang]?.images || g.ru?.images || [];

  detail.innerHTML = `
    <div class="ghostCard">
      <div class="ghostHeader">
        <h2>${esc(name)}</h2>
        <button class="back" id="backBtn">${esc(I18N[lang].back)}</button>
      </div>
      <div class="sections">
        <div class="colText"></div>
        <div class="colMedia"></div>
      </div>
    </div>
  `;
  $("#backBtn").addEventListener("click", closeGhost);

  const textCol = detail.querySelector(".colText");
  const mediaCol = detail.querySelector(".colMedia");

  Object.keys(sections).forEach(k => {
    const sec = document.createElement("div");
    sec.className = "sec";
    sec.innerHTML = `<h3>${esc(k)}</h3><div class="content"></div>`;
    const content = sec.querySelector(".content");

    const ul = document.createElement("ul");
    let lastLi = null;

    (sections[k] || []).forEach(line => {
      const s = String(line);
      const isSub = s.trim().startsWith("—") || s.trim().startsWith("–");
      const clean = s.replace(/^\s*[—–]\s?/, "");
      const li = document.createElement("li");
      li.innerHTML = highlightInline(clean);

      if(isSub && lastLi){
        let sub = lastLi.querySelector("ul");
        if(!sub){
          sub = document.createElement("ul");
          sub.className = "sublist";
          sub.style.paddingLeft = "18px";
          lastLi.appendChild(sub);
        }
        sub.appendChild(li);
      } else {
        ul.appendChild(li);
        lastLi = li;
      }
    });

    content.appendChild(ul);
    textCol.appendChild(sec);
  });

  if(imgs && imgs.length){
    imgs.forEach(im => {
      const box = document.createElement("div");
      box.className = "imgBox";
      const cap = (lang==="ru" ? (im.caption_ru||"") : (im.caption_en||"")) || "";
      box.innerHTML = `
        <img src="${esc(im.src)}" alt="${esc(name)}" loading="lazy" style="cursor:zoom-in" />
        <div class="imgCap"><div style="font-weight:900;color:rgba(232,238,252,.92)">${esc(cap)}</div></div>
      `;
      const imgEl = box.querySelector("img");
      imgEl.addEventListener("click", () => openImg(name, im.src, cap));
      mediaCol.appendChild(box);
    });
  } else {
    mediaCol.remove();
    textCol.parentElement.style.gridTemplateColumns = "1fr";
  }
  // animate section entrance
  revealSections();
}

function openImg(title, src, cap){
  const dlg = $("#imgDlg");
  $("#dlgTitle").textContent = title;
  $("#dlgImg").src = src;
  $("#dlgCap").textContent = cap || "";
  dlg.showModal();
}

$("#dlgClose").addEventListener("click", () => $("#imgDlg").close());
$("#imgDlg").addEventListener("click", (e) => {
  if(e.target === $("#imgDlg")) $("#imgDlg").close();
});

$("#btnRu").addEventListener("click", () => setLang("ru"));
$("#btnEn").addEventListener("click", () => setLang("en"));
search.addEventListener("input", renderHome);


// --- Mixed background: big glow + fine dust ---
const bg = {
  canvas: document.getElementById("dustCanvas"),
  ctx: null,
  w: 0, h: 0, dpr: 1,
  big: [],
  dust: [],
  running: true,
};

function bgResize(){
  bg.dpr = Math.min(2, window.devicePixelRatio || 1);
  bg.w = window.innerWidth;
  bg.h = window.innerHeight;
  bg.canvas.width = Math.floor(bg.w * bg.dpr);
  bg.canvas.height = Math.floor(bg.h * bg.dpr);
  bg.canvas.style.width = bg.w + "px";
  bg.canvas.style.height = bg.h + "px";
  bg.ctx = bg.canvas.getContext("2d");
  bg.ctx.setTransform(bg.dpr,0,0,bg.dpr,0,0);
}

function r(a,b){ return a + Math.random()*(b-a); }
function pick(arr){ return arr[(Math.random()*arr.length)|0]; }

const BIG_COLORS = [
  [120,160,255], // blue
  [200,120,255], // purple
  [150,200,255], // icy
  [255,120,200], // pink
];

function makeBig(){
  const c = pick(BIG_COLORS);
  return {
    x: r(0, bg.w),
    y: r(0, bg.h),
    rad: r(18, 54),
    vx: r(-0.12, 0.12),
    vy: r(-0.08, 0.14),
    a: r(0.10, 0.22),
    tw: r(0.0010, 0.0022),
    ph: r(0, Math.PI*2),
    c
  };
}

function makeDust(){
  return {
    x: r(0, bg.w),
    y: r(0, bg.h),
    r: r(0.35, 1.15),
    vx: r(-0.06, 0.08),
    vy: r(-0.05, 0.10),
    a: r(0.08, 0.22),
    tw: r(0.0020, 0.0045),
    ph: r(0, Math.PI*2),
  };
}

function bgInit(){
  bgResize();
  bg.big = [];
  bg.dust = [];
  const area = bg.w * bg.h;

  const bigCount = Math.max(28, Math.min(70, Math.round(area / 35000)));
  const dustCount = Math.max(140, Math.min(420, Math.round(area / 9000)));

  for(let i=0;i<bigCount;i++) bg.big.push(makeBig());
  for(let i=0;i<dustCount;i++) bg.dust.push(makeDust());
}

function wrap(p){
  if(p.x < -80) p.x = bg.w + 80;
  if(p.x > bg.w + 80) p.x = -80;
  if(p.y < -80) p.y = bg.h + 80;
  if(p.y > bg.h + 80) p.y = -80;
}

function draw(){
  if(!bg.running) return;
  requestAnimationFrame(draw);
  if(!bg.ctx) return;

  const ctx = bg.ctx;
  ctx.clearRect(0,0,bg.w,bg.h);
  ctx.globalCompositeOperation = "lighter";

  // Big glow particles
  for(const p of bg.big){
    p.x += p.vx;
    p.y += p.vy;
    wrap(p);

    p.ph += p.tw * 1000 * (1/60);
    const tw = 0.65 + 0.35*Math.sin(p.ph);
    const a = p.a * tw;

    const g = ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.rad);
    g.addColorStop(0, `rgba(${p.c[0]},${p.c[1]},${p.c[2]},${a})`);
    g.addColorStop(0.45, `rgba(${p.c[0]},${p.c[1]},${p.c[2]},${a*0.35})`);
    g.addColorStop(1, `rgba(${p.c[0]},${p.c[1]},${p.c[2]},0)`);

    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.rad, 0, Math.PI*2);
    ctx.fill();
  }

  // Fine dust (tiny points with soft twinkle)
  ctx.globalCompositeOperation = "screen";
  for(const p of bg.dust){
    p.x += p.vx;
    p.y += p.vy;
    wrap(p);

    p.ph += p.tw * 1000 * (1/60);
    const tw = 0.55 + 0.45*Math.sin(p.ph);
    const a = p.a * tw;

    ctx.fillStyle = `rgba(232,238,252,${a})`;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
    ctx.fill();

    // occasional micro-halo
    if(p.r > 0.9){
      ctx.fillStyle = `rgba(143,184,255,${a*0.10})`;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r*4.2, 0, Math.PI*2);
      ctx.fill();
    }
  }

  ctx.globalCompositeOperation = "source-over";
}

document.addEventListener("visibilitychange", () => {
  bg.running = !document.hidden;
  if(bg.running) requestAnimationFrame(draw);
});

window.addEventListener("resize", () => {
  bgInit();
});

bgInit();
requestAnimationFrame(draw);

setLang(lang);
</script>
